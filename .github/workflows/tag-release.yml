name: Auto-tag on version bump

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tamasfe/auto-tag@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
